<body>
    <header>
        <h1>Visual Diff Checker</h1>
        <button class="secondary" onclick="clearAll()">Clear All</button>

        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">DARK MODE</button>
    </header>

    <div class="input-container">
       <div class="input-box">
    <div class="label-row">
        <label for="original">Original Text</label>
        <button
            type="button"
            class="sample-button"
            onclick="loadSample('original')">
            Load Sample
        </button>
    </div>

    <textarea
        id="original"
        placeholder="Paste original code/text here..."></textarea>
</div>

<div class="input-box">
    <div class="label-row">
        <label for="modified">Modified Text</label>
        <button
            type="button"
            class="sample-button"
            onclick="loadSample('modified')">
            Load Sample
        </button>
    </div>

    <textarea
        id="modified"
        placeholder="Paste modified code/text here..."></textarea>
</div>
    </div>

    <div class="controls">
        <button onclick="compareText()">🔍 Compare Differences</button>
    </div>

    <div class="diff-output" id="output">
        <div style="padding: 20px; color: var(--muted); text-align: center;">Result will appear here...</div>
    </div>
    <footer>
        <a href="../../index.html">&larr; Back to Home</a>
    </footer>
    <script src="diff-logic.js"></script>
    <script src="../../theme.js"></script>
</body>

</html>
