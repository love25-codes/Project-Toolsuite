<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Optimizer & Sanitizer</title>
    <meta property="og:title" content="SVG Optimizer & Sanitizer - Project Toolsuite" />
    <meta property="og:description" content="Optimize and sanitize SVG files to reduce size and improve performance directly in your browser." />
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SVG Optimizer & Sanitizer - Project Toolsuite" />
    <meta name="twitter:description" content="Optimize and sanitize SVG files to reduce size and improve performance directly in your browser." />
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
</head>
<body>

    <header>
        <h1>SVG Optimizer</h1>
        <div>
            <button onclick="document.getElementById('file-input').click()" class="secondary" aria-label="Upload SVG file">📂 Upload SVG</button>
            <input type="file" id="file-input" accept=".svg">
        </div>
    
        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">DARK MODE</button>
    <div class="toolbar">
        <span>Settings:</span>
        <label><input type="checkbox" id="opt-comments" checked> Remove Comments</label>
        <label><input type="checkbox" id="opt-metadata" checked> Remove Metadata</label>
        <label><input type="checkbox" id="opt-empty" checked> Remove Empty Groups</label>
        <label><input type="checkbox" id="opt-minify" checked> Minify (Remove whitespace)</label>
        <div style="flex-grow: 1"></div>
        <button id="btn-optimize" aria-label="Optimize SVG">⚡ Optimize Now</button>
        <button id="btn-copy" class="secondary" aria-label="Copy optimized SVG">📋 Copy Result</button>
    </div>

    <div class="main-grid">
        <div class="editor-container">
            <div class="label-row">
                <span>Input Source</span>
                <span id="stat-original">0 Bytes</span>
            </div>
            <textarea id="input-svg" placeholder="Paste your <svg> code here..."></textarea>
        </div>

        <div class="editor-container">
            <div class="label-row">
                <span>Optimized Output</span>
                <span id="stat-optimized" class="stat-badge success">Saved: 0%</span>
            </div>
            <textarea id="output-svg" readonly placeholder="Optimized code will appear here..."></textarea>
        </div>

        <div class="preview-container">
            <div class="preview-box">
                <h4>Original</h4>
                <div id="preview-original" class="svg-render"></div>
            </div>
            <div style="font-size: 2rem; color: var(--muted);">➔</div>
            <div class="preview-box">
                <h4>Optimized</h4>
                <div id="preview-optimized" class="svg-render"></div>
            </div>
        </div>
    </div>

    <script src="svg-logic.js"></script>
    <footer>
        <a href="../../index.html">&larr; Back to Home</a>
    </footer>
</body>
</html>
