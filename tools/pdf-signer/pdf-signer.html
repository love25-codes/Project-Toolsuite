    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    
    <link rel="stylesheet" href="../../theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Secure PDF Signer</h1>
    <p>Sign locally. Multi-signature support. No server storage.</p>

        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button></header>
<div class="main-layout">
    <div id="pdf-workbench"><div id="pages-container"></div></div>
    <div class="sidebar">
        <button onclick="clearPad()" style="width:100%; background:none; border:1px solid var(--border); color:var(--text); cursor:pointer; margin-top:5px;"></button>
        <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
        <label>2. Draw Signature</label>
        <canvas id="scribble-pad"></canvas>
        <button onclick="clearPad()" style="width:100%; background:none; border:1px solid var(--border); color:var(--text); cursor:pointer; margin-top:5px;">Clear</button>
        <hr style="border:1px solid var(--border); margin: 20px 0;">
        <label>3. Color</label>
        <input type="color" id="sigColor" value="#000000" style="width:100%; height:40px; border:2px solid var(--border); margin-bottom:10px;">
        <button id="exportBtn" class="action-btn" disabled>4. Export PDF</button>
    </div>
</div>
    <footer>
        <a href="../../index.html">&larr; Back to Home</a>
    </footer>
<script src="pdf-signer-logic.js"></script>
<script src="../../theme.js"></script>
</body>
