<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Scrubber - Project Toolsuite</title>
    <meta name="description" content="Remove sensitive metadata from your images before sharing.">
    <meta property="og:title" content="EXIF Scrubber - Project Toolsuite">
    <meta property="og:description" content="Remove sensitive metadata from your images before sharing.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EXIF Scrubber - Project Toolsuite">
    <meta name="twitter:description" content="Remove sensitive metadata from your images before sharing.">
    <meta name="twitter:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    <style>
        /* Shared Toolsuite Theme */
        * { box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            max-width: 880px;
            margin: 32px auto;
            padding: 24px;
        }

        header { border-bottom: 4px solid var(--border); margin-bottom: 32px; padding-bottom: 12px; }
        h1 { font-size: 2.1rem; text-transform: uppercase; margin: 0 0 6px; }
        h2 { font-size: 1.05rem; text-transform: uppercase; margin: 32px 0 12px; letter-spacing: 0.04em; }

        input[type="file"] {
            display: block; width: 100%; font-family: inherit;
            border: 2px solid var(--border); padding: 12px; margin-top: 8px;
            cursor: pointer; background: #f4f4f4;
        }

        button {
            font-family: inherit; background: var(--bg); border: 2px solid var(--border);
            padding: 12px 22px; margin-top: 18px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 4px 4px 0 var(--border); transition: transform 0.1s;
        }

        /* Scrubber Specific Styles */
        .file-list { display: grid; gap: 20px; margin-top: 20px; }
        
        .file-card {
            border: 2px solid var(--border);
            padding: 15px;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 20px;
            align-items: center;
        }

        .file-thumb {
            width: 80px; height: 80px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: var(--tag-bg);
        }

        .meta-warning {
            color: #d00;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 5px;
            display: block;
        }

        .meta-safe { color: #008000; font-weight: bold; font-size: 0.9rem; }

        .btn-download { background: #008000; color: #fff; border-color: #006400; }
        
        #bulkActions { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px dashed var(--border); }

        footer {
            margin-top: 60px;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        footer a {
            color: var(--text);
            text-decoration: none;
            font-weight: 900;
            border: 2px solid var(--border);
            padding: 8px 16px;
            display: inline-block;
            transition: all 0.2s ease;
        }

        footer a:hover {
            background: var(--text);
            color: var(--bg);
        }

        #themeBtn{
            top: -15px;
        }


    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>

<header>
    <h1>EXIF Metadata Scrubber</h1>
    <p>Remove GPS coordinates, camera models, and hidden timestamps from your photos before sharing.</p>
    <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">DARK MODE</button></header>

<main>
    <section>
        <h2>1. Select Photos</h2>
        <input type="file" id="imageInput" accept="image/jpeg, image/png, image/webp" multiple>
        <p style="font-size: 0.85rem; margin-top: 5px;">Supports Bulk Upload. Processing happens entirely on your device.</p>
    </section>

    <section>
        <h2>2. Privacy Analysis & Scrubbing</h2>
        <div id="fileList" class="file-list">
            <div style="text-align: center; padding: 40px; border: 2px dashed #ccc; color: #777;">
                No images selected yet.
            </div>
        </div>

        <div id="bulkActions">
            <button onclick="scrubAll()" id="btnScrubAll">Scrub All Images</button>
            <button onclick="downloadAll()" id="btnDownloadAll" class="btn-download" disabled>Download All Cleaned</button>
        </div>
    </section>
</main>

    <footer>
        <a href="../../index.html">&larr; Back to Home</a>
    </footer>
<script src="scrubber.js"></script>
<script src="../../theme.js"></script>
</body>
</html>
