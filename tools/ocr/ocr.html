    <style>

       /*Design Tokens */
:root {
    --font-main: 'Courier New', Courier, monospace;

    --text-sm: 0.85rem;
    --text-md: 0.95rem;
    --text-lg: 1.1rem;
    --text-xl: 2rem;

    --space-xs: 6px;
    --space-sm: 12px;
    --space-md: 20px;
    --space-lg: 32px;
    --space-xl: 48px;

    --color-text: var(--text);
    --color-muted: var(--muted);
    --color-bg: var(--bg);
    --color-border: var(--border);
}

/*Global Layout*/
body {
    font-family: var(--font-main);
    background-color: var(--color-bg);
    color: var(--color-text);
    line-height: 1.7;
    max-width: 900px;
    margin: var(--space-xl) auto;
    padding: var(--space-md);
}

/*Header*/
header {
    border-bottom: 4px solid var(--color-border);
    margin-bottom: var(--space-lg);
    padding-bottom: var(--space-sm);
}

header p {
    color: var(--muted);
    margin-top: 8px;
}

h1 {
    font-size: var(--text-xl);
    text-transform: uppercase;
    margin: 0 0 var(--space-xs);
}

#themeBtn{
    top: -5px;
}
/*
*/
input[type="file"] {
    display: block;
    width: 100%;
    font-family: var(--font-main);
    border: 2px solid var(--color-border);
    padding: var(--space-sm);
    box-sizing: border-box;
    margin: var(--space-md) 0;
    background: var(--bg);
}

/* Status Area */
#status-container {
    margin-bottom: var(--space-sm);
}

/* #status {
    padding: var(--space-xs) var(--space-sm);
    border: 2px dashed var(--color-border);
    display: inline-block;
    font-size: var(--text-sm);
    text-transform: uppercase;
} */

#status {
    padding: 10px 14px;
    border: 2px dashed var(--color-border);
    background: var(--tag-bg);
    color: var(--text);
}

/*Output Area */
#output {
    width: 100%;
    min-height: 300px;
    border: 2px solid var(--color-border);
    padding: var(--space-sm);
    font-family: var(--font-main);
    background: var(--bg);
    box-sizing: border-box;
    margin-top: var(--space-sm);
    resize: vertical;
    transition: background-color 0.2s ease;
    border-radius: 4px;
    line-height: 1.6;
}

#output:focus {
    outline: none;
    background-color: var(--tag-bg);
}

#output::placeholder {
    color: var(--muted);
}

#output:hover {
    background-color: var(--tag-bg);
}

/*Progress Bar*/
progress {
    width: 100%;
    height: 14px;
    border: 2px solid var(--color-border);
    appearance: none;
    margin-bottom: var(--space-md);
}

progress::-webkit-progress-bar {
    background: var(--bg);
}

progress::-webkit-progress-value {
    background: var(--text);
}

progress::-moz-progress-bar {
    background: var(--text);
}

/*Buttons*/
button {
    font-family: var(--font-main);
    background-color: var(--color-bg);
    color: var(--color-text);
    border: 2px solid var(--color-border);
    padding: 10px 22px;
    text-transform: uppercase;
    font-weight: bold;
    cursor: pointer;
    margin-top: var(--space-sm);
    transition: all 0.15s ease;
}

button:hover {
    background-color: var(--text);
    color: var(--bg);
    transform: translateY(-2px);
}

button:active {
    transform: scale(0.96);
}

#loadUrlBtn {
    margin-top: 0;
    margin-bottom: 8px;
}

#status-container {
    margin-top: 8px;
}

/*Helpers*/
hr {
    border: none;
    border-top: 1px solid var(--color-border);
    margin: var(--space-lg) 0;
}

a {
    color: var(--color-text);
    text-decoration: none;
    border-bottom: 1px dotted var(--color-border);
    transition: background-color 0.15s ease, color 0.15s ease;
}

a:hover {
    background-color: var(--text);
    color: var(--bg);
}

input[type="text"] {
    display: block;
    width: 100%;
    font-family: var(--font-main);
    border: 2px solid var(--color-border);
    padding: var(--space-sm);
    box-sizing: border-box;
    margin: var(--space-md) 0;
    background: var(--bg);
    color: var(--text);
}
fix/theme-consistency-200

input[type="file"]:hover,
input[type="text"]:hover {
    background-color: var(--tag-bg);
}

input[type="file"]:focus,
input[type="text"]:focus {
    outline: none;
    border-color: var(--text);
}

section {
    border: 2px solid var(--border);
    padding: 24px;
    background: var(--bg);
}

/*Footer*/
footer {
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        footer a {
            color: var(--text);
            text-decoration: none;
            font-weight: 900;
            border: 2px solid var(--border);
            padding: 8px 16px;
            display: inline-block;
            transition: all 0.2s ease;
        }

        footer a:hover {
            background: var(--text);
            color: var(--bg);
        }

/*Responsive*/
@media (max-width: 600px) {
    body {
        margin: var(--space-md) auto;
        padding: var(--space-sm);
    }

    h1 {
        font-size: 1.6rem;
    }

    #output {
        min-height: 220px;
    }
}
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>

    <header>
        <h1>OCR Text Scanner</h1>
        <p>Extract text from images locally. Private. Secure. No server.</p>
        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button></header>
    <main>
        <section>
            <input
                type="file"
                id="fileInput"
                accept="image/*"
                aria-label="Upload image for OCR"

            >
            <input
                type="text"
                id="imageUrl"
                placeholder="or paste an image URL here..."
                aria-label="Image URL input"

            >
            <button id="loadUrlBtn">Load Image Url</button>

            <div id="status-container">
                <span id="status">System Status: Ready</span>
            </div>

            <progress id="progress" value="0" max="1" style="display:none;"></progress>

            <textarea
                id="output"
                placeholder="Recognized text will appear here..."
                aria-label="OCR output text"
            ></textarea>
            <button id="copyBtn">Copy Text to Clipboard</button>
        </section>
    </main>

    <footer>
      <a href="../../index.html">← Back to Home</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="ocr-logic.js"></script>
    <script src="../../theme.js"></script>
</body>
</html>
