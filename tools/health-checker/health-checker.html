<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Health Checker</title>

    <link rel="stylesheet" href="../../theme.css">
    <link rel="stylesheet" href="./health-checker.css">
</head>
<body>

    <main class="container">

        <div class="tool-shell">

            <header class="tool-header">
                <h1>TOOL HEALTH CHECKER</h1>

                <p class="description">
                    Validate registered tools, verify theme integration,
                    and detect missing assets across Project Toolsuite.
                </p>

                <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button></header>
            </header>

            <section class="panel">
                <button id="runScanBtn" class="btn">
                    Run Health Scan
                </button>

                <div id="summary">
                    No scan executed.
                </div>
            </section>

            <section class="panel">
                <h2>Scan Results</h2>

                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Tool</th>
                            <th>Page</th>
                            <th>Theme CSS</th>
                            <th>Theme JS</th>
                        </tr>
                    </thead>

                    <tbody id="resultsBody">
                    </tbody>
                </table>
            </section>

            <section class="panel">
                <button id="downloadJsonBtn" class="btn" disabled>
                    Download JSON Report
                </button>
            </section>

            <footer>
                <a href="../../index.html" class="home-btn">
                    ← Back to Home
                </a>
            </footer>

        </div>

    </main>

    <script src="../../theme.js"></script>
    <script src="./health-checker.js"></script>

</body>
</html>
