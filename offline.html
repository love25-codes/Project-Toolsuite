<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Project Toolsuite</title>
    <link rel="stylesheet" href="theme.css">
    <script src="./theme.js"></script>
</head>
<body>
    <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme" aria-pressed="false">
        DARK MODE
    </button>
    <main style="max-width:700px;margin:80px auto;text-align:center;padding:20px;">
        <h1>You are offline</h1>

        <p>
            Project Toolsuite could not reach the network.
        </p>

        <p>
            Please reconnect and try again.
        </p>

        <button onclick="location.reload()">
            Retry
        </button>
    </main>
    
</body>
</html>
